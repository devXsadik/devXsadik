# Generates profile metrics SVGs via https://github.com/lowlighter/metrics
# Setup: add a PAT (no scopes required) as repository secret METRICS_TOKEN
name: Metrics

on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Header, languages & coding habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: devXsadik
          template: classic
          filename: github-metrics.svg
          base: header
          base_indepth: yes
          config_display: columns
          config_animations: yes
          config_timezone: Asia/Dhaka
          config_order: base.header, languages, habits
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, shell, vue, json, markdown
          plugin_languages_colors: github
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          extras_css: |
            :root {
              --color-calendar-graph-day-L1-bg: #6c3ce022;
              --color-calendar-graph-day-L2-bg: #6c3ce055;
              --color-calendar-graph-day-L3-bg: #6c3ce088;
              --color-calendar-graph-day-L4-bg: #6c3ce0;
            }
            h2 { color: #00d4ff !important; }
            .field { color: #c9d1d9; }

      - name: Isometric commit calendar
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: devXsadik
          filename: github-metrics.calendar.svg
          base: ""
          config_timezone: Asia/Dhaka
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Activity, achievements & code changes
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: devXsadik
          filename: github-metrics.activity.svg
          base: ""
          config_timezone: Asia/Dhaka
          config_order: activity, achievements, lines, followup
          plugin_activity: yes
          plugin_activity_limit: 6
          plugin_activity_days: 14
          plugin_activity_visibility: all
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 8
          plugin_achievements_secrets: yes
          plugin_lines: yes
          plugin_lines_sections: base, repositories
          plugin_lines_history_limit: 1
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes

      - name: Featured repositories
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: devXsadik
          filename: github-metrics.repositories.svg
          base: ""
          config_timezone: Asia/Dhaka
          plugin_repositories: yes
          plugin_repositories_featured: devXsadik/Brain-Dump-Task-Organizer, devXsadik/TeamBinaryDIU-TicketAnalyzer, devXsadik/sadik-portfolio, devXsadik/dataset-file-convertor

<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="40%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#080c18"/>
    </linearGradient>
    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.4" fill="#6c3ce0" opacity="0.12"/>
    </pattern>
    <pattern id="hexPattern" width="56" height="48" patternUnits="userSpaceOnUse">
      <polygon points="28,0 56,14 56,34 28,48 0,34 0,14" fill="none" stroke="#6c3ce0" stroke-width="0.2" opacity="0.03"/>
    </pattern>
    <radialGradient id="neonGlow1" cx="15%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#6c3ce0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="neonGlow2" cx="85%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="neonGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="imgAura" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#6c3ce0" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="scanLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="48%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.04"/>
      <stop offset="52%" stop-color="transparent"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="200" cy="200" r="85"/>
    </clipPath>
    <filter id="imgShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#6c3ce0" flood-opacity="0.4"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      @keyframes ringRotate {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -570; }
      }
      @keyframes ringRotateReverse {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 680; }
      }
      @keyframes scan {
        0% { transform: translateY(-400px); }
        100% { transform: translateY(400px); }
      }
      @keyframes circlePulse {
        0%, 100% { r: 2; opacity: 0.5; }
        50% { r: 3.5; opacity: 1; }
      }
      @keyframes dashFlow {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -40; }
      }
      @keyframes textStrokeGlow {
        0%, 100% { stroke: #00d4ff; stroke-opacity: 0.7; }
        50% { stroke: #6c9fff; stroke-opacity: 1; }
      }
      @keyframes cursorBlink {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 0; }
      }
      @keyframes statusPulse {
        0%, 100% { r: 4; fill-opacity: 0.7; }
        50% { r: 5; fill-opacity: 1; }
      }
      @keyframes orbFloat1 {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(5px, -3px); }
        75% { transform: translate(-3px, 5px); }
      }
      @keyframes orbFloat2 {
        0%, 100% { transform: translate(0, 0); }
        33% { transform: translate(-6px, 4px); }
        66% { transform: translate(4px, -5px); }
      }
      .img-float { animation: float 5s ease-in-out infinite; transform-origin: 200px 200px; }
      .ring-main { stroke-dasharray: 12, 8; animation: ringRotate 10s linear infinite; }
      .ring-outer { stroke-dasharray: 4, 12; animation: ringRotateReverse 14s linear infinite; }
      .ring-inner { stroke-dasharray: 2, 18; animation: ringRotate 7s linear infinite; }
      .aura-pulse { animation: glowPulse 4s ease-in-out infinite; }
      .scan-line { animation: scan 8s linear infinite; }
      .circle-pulse { animation: circlePulse 2.5s ease-in-out infinite; }
      .dash-flow { stroke-dasharray: 8, 12; animation: dashFlow 3s linear infinite; }
      .name-text { fill: transparent; stroke: #00d4ff; stroke-width: 1.5; paint-order: stroke; stroke-linejoin: round; animation: textStrokeGlow 4s ease-in-out infinite; }
      .subtitle { fill: #7b8496; font-family: 'Segoe UI', sans-serif; font-size: 14px; letter-spacing: 5px; }
      .cursor-blink { animation: cursorBlink 1.2s step-end infinite; }
      .status-dot { animation: statusPulse 2s ease-in-out infinite; }
      .orb1 { animation: orbFloat1 8s ease-in-out infinite; }
      .orb2 { animation: orbFloat2 10s ease-in-out infinite; }
    </style>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="400" rx="16" fill="url(#bgGrad)"/>
  <rect width="1200" height="400" rx="16" fill="url(#dotGrid)"/>
  <rect width="1200" height="400" rx="16" fill="url(#hexPattern)"/>
  <rect width="1200" height="400" rx="16" fill="url(#neonGlow1)"/>
  <rect width="1200" height="400" rx="16" fill="url(#neonGlow2)"/>
  <rect width="1200" height="400" rx="16" fill="url(#neonGlow3)"/>
  <rect class="scan-line" width="1200" height="400" rx="16" fill="url(#scanLine)"/>

  <!-- CORNER BRACKETS -->
  <path d="M16 55V16H55" fill="none" stroke="#6c3ce0" stroke-width="1.2" opacity="0.5"/>
  <path d="M1184 345V384H1145" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>
  <path d="M1184 55V16H1145" fill="none" stroke="#ff6b9d" stroke-width="0.8" opacity="0.25"/>
  <path d="M16 345V384H55" fill="none" stroke="#ff6b9d" stroke-width="0.8" opacity="0.25"/>

  <!-- CIRCUIT LINES LEFT -->
  <g opacity="0.9">
    <line x1="30" y1="85" x2="70" y2="85" stroke="#6c3ce0" stroke-opacity="0.2" stroke-width="0.8" class="dash-flow"/>
    <line x1="30" y1="130" x2="60" y2="130" stroke="#00d4ff" stroke-opacity="0.12" stroke-width="0.8"/>
    <line x1="30" y1="300" x2="70" y2="300" stroke="#6c3ce0" stroke-opacity="0.15" stroke-width="0.8" class="dash-flow"/>
    <line x1="30" y1="340" x2="55" y2="340" stroke="#ff6b9d" stroke-opacity="0.1" stroke-width="0.8"/>
  </g>
  <!-- CIRCUIT LINES RIGHT -->
  <g opacity="0.9">
    <line x1="980" y1="70" x2="1170" y2="70" stroke="#00d4ff" stroke-opacity="0.1" stroke-width="0.8"/>
    <line x1="1000" y1="110" x2="1170" y2="110" stroke="#6c3ce0" stroke-opacity="0.12" stroke-width="0.8" class="dash-flow"/>
    <line x1="990" y1="150" x2="1100" y2="150" stroke="#ff6b9d" stroke-opacity="0.08" stroke-width="0.8"/>
    <line x1="1010" y1="250" x2="1170" y2="250" stroke="#6c3ce0" stroke-opacity="0.1" stroke-width="0.8"/>
    <line x1="1000" y1="290" x2="1170" y2="290" stroke="#00d4ff" stroke-opacity="0.12" stroke-width="0.8" class="dash-flow"/>
    <line x1="1020" y1="330" x2="1170" y2="330" stroke="#6c3ce0" stroke-opacity="0.08" stroke-width="0.8"/>
  </g>

  <!-- NODE DOTS -->
  <circle cx="70" cy="85" r="2" fill="#6c3ce0" class="circle-pulse"/>
  <circle cx="60" cy="130" r="2" fill="#00d4ff" class="circle-pulse" style="animation-delay: 0.6s"/>
  <circle cx="70" cy="300" r="2" fill="#6c3ce0" class="circle-pulse" style="animation-delay: 1.2s"/>
  <circle cx="1170" cy="70" r="2" fill="#00d4ff" class="circle-pulse" style="animation-delay: 0.3s"/>
  <circle cx="1100" cy="150" r="2" fill="#ff6b9d" class="circle-pulse" style="animation-delay: 0.9s"/>
  <circle cx="1170" cy="290" r="2" fill="#00d4ff" class="circle-pulse" style="animation-delay: 1.5s"/>

  <!-- FLOATING SHAPES -->
  <g class="orb1">
    <rect x="55" y="200" width="6" height="6" rx="1" fill="none" stroke="#6c3ce0" stroke-width="0.4" opacity="0.25" transform="rotate(45 58 203)"/>
  </g>
  <g class="orb2">
    <polygon points="1120,200 1128,200 1124,192" fill="none" stroke="#00d4ff" stroke-width="0.4" opacity="0.2"/>
  </g>

  <!-- STATUS INDICATOR -->
  <circle cx="85" cy="38" r="4" fill="#00ff88" class="status-dot"/>
  <text x="98" y="42" fill="#00ff88" font-family="'Courier New', monospace" font-size="10" opacity="0.7" letter-spacing="1">AVAILABLE</text>
  <text x="1115" y="42" fill="#8b93a8" font-family="'Courier New', monospace" font-size="9" opacity="0.4" text-anchor="end">v2026.06</text>

  <!-- ============ ANIMATED PROFILE IMAGE ============ -->
  <g class="img-float">
    <circle cx="200" cy="200" r="120" fill="url(#imgAura)" class="aura-pulse" filter="url(#softGlow)"/>
    <circle cx="200" cy="200" r="108" fill="none" stroke="#6c3ce0" stroke-width="0.4" opacity="0.2" class="ring-outer"/>
    <circle cx="200" cy="200" r="98" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.6" class="ring-main"/>
    <circle cx="200" cy="200" r="90" fill="none" stroke="#6c3ce0" stroke-width="0.6" opacity="0.35" class="ring-inner"/>
    <image x="115" y="115" width="170" height="170" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice" filter="url(#imgShadow)" href="data:image/png;base64,YOUR_BASE64_IMAGE_HERE"/>
    <circle cx="200" cy="200" r="85" fill="none" stroke="#0d1117" stroke-width="2" opacity="0.5"/>
    <circle cx="200" cy="200" r="85" fill="none" stroke="#6c3ce0" stroke-width="0.5" opacity="0.3"/>
    <circle cx="200" cy="94" r="3" fill="#00d4ff" opacity="0.7" class="circle-pulse" style="animation-delay: 0.2s"/>
    <circle cx="296" cy="200" r="3" fill="#6c3ce0" opacity="0.7" class="circle-pulse" style="animation-delay: 0.8s"/>
    <circle cx="200" cy="306" r="3" fill="#ff6b9d" opacity="0.5" class="circle-pulse" style="animation-delay: 1.4s"/>
    <circle cx="104" cy="200" r="3" fill="#6c3ce0" opacity="0.6" class="circle-pulse" style="animation-delay: 2.0s"/>
  </g>

  <!-- ============ TEXT CONTENT ============ -->
  <text x="700" y="155" text-anchor="middle" font-family="'Segoe UI', 'Arial Black', sans-serif" font-weight="800" font-size="42" class="name-text" letter-spacing="3">
    HANJALA HABIB SADIK
  </text>

  <line x1="500" y1="175" x2="900" y2="175" stroke="#6c3ce0" stroke-width="0.4" opacity="0.25"/>
  <line x1="600" y1="175" x2="800" y2="175" stroke="#00d4ff" stroke-width="0.6" opacity="0.4"/>

  <text x="700" y="205" text-anchor="middle" class="subtitle">
    FULL STACK DEVELOPER  ·  DIGITAL CRAFTSMAN
  </text>

  <!-- SKILL TAGS -->
  <g font-family="'Courier New', monospace" font-size="10" opacity="0.5">
    <rect x="490" y="225" width="65" height="20" rx="4" fill="none" stroke="#6c3ce0" stroke-width="0.5"/>
    <text x="522" y="239" fill="#6c3ce0" text-anchor="middle">React</text>
    <rect x="565" y="225" width="72" height="20" rx="4" fill="none" stroke="#00d4ff" stroke-width="0.5"/>
    <text x="601" y="239" fill="#00d4ff" text-anchor="middle">Node.js</text>
    <rect x="647" y="225" width="85" height="20" rx="4" fill="none" stroke="#6c3ce0" stroke-width="0.5"/>
    <text x="689" y="239" fill="#6c3ce0" text-anchor="middle">TypeScript</text>
    <rect x="742" y="225" width="65" height="20" rx="4" fill="none" stroke="#00d4ff" stroke-width="0.5"/>
    <text x="774" y="239" fill="#00d4ff" text-anchor="middle">Python</text>
    <rect x="817" y="225" width="55" height="20" rx="4" fill="none" stroke="#ff6b9d" stroke-width="0.5"/>
    <text x="844" y="239" fill="#ff6b9d" text-anchor="middle">AI/ML</text>
    <rect x="882" y="225" width="55" height="20" rx="4" fill="none" stroke="#6c3ce0" stroke-width="0.5"/>
    <text x="909" y="239" fill="#6c3ce0" text-anchor="middle">Docker</text>
  </g>

  <!-- DECORATIVE BARS -->
  <rect x="500" y="270" width="400" height="1.5" rx="1" fill="#6c3ce0" opacity="0.1"/>
  <rect x="600" y="270" width="200" height="1.5" rx="1" fill="#00d4ff" opacity="0.2"/>
  <rect x="670" y="268" width="60" height="5" rx="3" fill="#6c3ce0" opacity="0.15"/>

  <!-- LOCATION -->
  <text x="700" y="300" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#6c3ce0" opacity="0.45" letter-spacing="2">
    📍 BANGLADESH  ·  🎓 CSE UNDERGRAD
  </text>

  <!-- TERMINAL PROMPT -->
  <text x="700" y="340" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#00d4ff" opacity="0.35">
    ~/sadikworkbd5622 $
  </text>
  <rect x="767" y="329" width="7" height="13" fill="#00d4ff" opacity="0.4" class="cursor-blink"/>

  <!-- VERSION DOTS -->
  <circle cx="1130" cy="370" r="1.5" fill="#6c3ce0" opacity="0.3"/>
  <circle cx="1140" cy="370" r="1.5" fill="#00d4ff" opacity="0.3"/>
  <circle cx="1150" cy="370" r="1.5" fill="#ff6b9d" opacity="0.3"/>
</svg>
